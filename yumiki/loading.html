<!DOCTYPE html>
<html lang="ja">
  <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YUMIKI WORLD - Loading</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
   
  </head>
  <body>
    <div class="loading-screen">
      <div class="loading-content">
        <img src="images/nogizaka-logo-banner.png" alt="乃木坂ロゴ" class="logo" />
        <h1>弓木奈於 推しサイト</h1>
        <h2>〜YUMIKI WORLD〜</h2>
        <div class="loading-text">Loading Now...</div>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>

    <script>
      // URLからリダイレクト先を取得する関数
      function getRedirectUrl() {
          const params = new URLSearchParams(window.location.search);
          return params.get('redirect');
      }

      document.addEventListener('DOMContentLoaded', () => {
        const loadingScreen = document.querySelector('.loading-screen');
        const progressBar = document.getElementById('progressBar');
        const redirectUrl = getRedirectUrl();

        let progress = 0;
        const totalDuration = 2000; // ローディングアニメーションの全体時間
        const updateInterval = 50; // プログレスバー更新間隔

        // まずローディング画面をフェードイン表示
        loadingScreen.classList.add('show');

        // プログレスバーのアニメーション
        const animateProgress = () => {
          const intervalId = setInterval(() => {
            progress += (updateInterval / totalDuration) * 100;
            if (progress >= 100) {
              progress = 100;
              clearInterval(intervalId); // アニメーション終了
            }
            progressBar.style.width = progress + '%';
          }, updateInterval);
        };

        // ローディングアニメーション開始
        animateProgress();

        // 指定時間が経過後、フェードアウトしてリダイレクト
        setTimeout(() => {
          loadingScreen.classList.add('fade-out');
          // フェードアウトアニメーションが完了したらリダイレクト
          loadingScreen.addEventListener('transitionend', function handler() {
            if (redirectUrl) {
              window.location.href = redirectUrl;
            } else {
              window.location.href = 'index.html';
            }
            loadingScreen.removeEventListener('transitionend', handler);
          });
        }, totalDuration + 500); // プログレスバー完了後、少し待ってからフェードアウト
      });
    </script>
  </body>
</html>
