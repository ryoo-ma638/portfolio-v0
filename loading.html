<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Osaki Ryoma - Loading</title>
    <link rel="stylesheet" href="css/loading.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="loading-screen">
      <div class="loading-overlay"></div>

      <div class="loading-content">
        <img src="images/your-logo.png" alt="ポートフォリオロゴ" class="logo" />
        <h1 class="loading-title">OSAKI RYOMA PORTFOLIO</h1>
        <p class="loading-subtitle">ENTER THE NEW WORLD</p>
        <div class="loading-bar-wrapper">
          <div class="loading-bar">
            <div class="loading-progress"></div>
          </div>
        </div>
        <p class="loading-percent">0%</p>
      </div>
    </div>

    <script src="js/loading.js"></script>
  </body>
</html>
